name: qibli
description: "A Muslim utility app with prayer times, Qibla compass, and Islamic calendar."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management & persistence
  provider: ^6.1.2
  shared_preferences: ^2.3.3

  # Location & sensors
  geolocator: ^13.0.2
  geocoding: ^4.0.0
  flutter_compass: ^0.8.0
  sensors_plus: ^7.0.0

  # Prayer times calculation (Dart port of adhan-js)
  adhan: ^2.0.0+1

  # Audio
  audioplayers: ^6.1.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/cities.json
